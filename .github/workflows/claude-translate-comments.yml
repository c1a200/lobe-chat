name: Claude Translate Non-English Comments

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  translate:
    runs-on: ubuntu-latest
    if: github.repository == 'lobehub/lobe-chat' || (github.repository_owner == 'c1a200' && vars.CLAUDE_CODE_ENABLED == 'true')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Run Claude Code for Comment Translation
        uses: lobehub/claude-code-action@v1
        with:
          token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: 'Translate non-English comments to English'
