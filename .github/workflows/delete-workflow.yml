name: Delete Workflow Runs


on:
  schedule:
    - cron: '0 0 * * 0' # 每周日运行
  workflow_dispatch:
    inputs:
      days:
        description: '手动运行时要保留日志的天数 (默认: 7)'
        required: false
        default: '7'
permissions:
  actions: write
  contents: read
jobs:
  del_runs:
    if: github.repository == 'lobehub/lobe-chat' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Workflow Runs
        uses: GitRML/delete-workflow-runs@main
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: ${{ github.event.inputs.days || 7 }}
          keep_minimum_runs: 6
