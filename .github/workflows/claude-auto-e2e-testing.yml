name: 'Claude Auto E2E Testing'

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# Fork 保护 - 防止被上游同步覆盖
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    if: github.repository == 'lobehub/lobe-chat' || github.repository_owner == 'c1a200'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      # ... other steps (kept minimal for fork compatibility)
      - name: Run E2E tests (skipped in fork)
        if: github.repository == 'lobehub/lobe-chat'
        run: echo 'E2E tests skipped in fork for stability'
