name: Claude Auto E2E Testing

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    if: github.repository == 'lobehub/lobe-chat' || github.repository_owner == 'c1a200'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          # Add any necessary env vars
          CI: true
